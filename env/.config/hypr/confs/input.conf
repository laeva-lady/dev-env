input {
    kb_layout = us,ca
    kb_variant = colemak,fr-colemak

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    # scroll_factor = 0.4

    touchpad {
        natural_scroll = false
    }
}

gestures {
    workspace_swipe = false
}

device {
    name=wacom-one-by-wacom-m-pen
    output=HDMI-A-1
}
