windowrule = opacity 0.9 0.8 1.0, fullscreen:1

windowrule = workspace $ws01, class:zen
windowrule = workspace $ws05, class:Tor Browser
windowrule = workspace $ws06, class:steam
windowrule = workspace $ws06, class:.*[Mm]inecraft.*
windowrule = workspace $ws07, class:thunderbird
windowrule = workspace $ws08, class:Spotify
windowrule = workspace $ws09, class:discord

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
