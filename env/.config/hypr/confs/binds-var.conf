$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun # uses rofi-wayland
$browser = zen-browser
$search = rofi -dmenu -p " 󰜏 |  " | xargs -I{} xdg-open https://unduck.link\?q\=\{\}
$bar = waybar
$run_menu = rofi -show run
$showWindows = rofi -show
$emoji = rofi -modi emoji -show emoji


$mainMod = SUPER

$ws01 = name:browser
$ws02 = name:coding
$ws03 = name:misc3
$ws04 = name:misc4
$ws05 = name:misc5
$ws06 = name:tor6
$ws07 = name:vgaming7
$ws08 = name:xmua8 # m(u/a) -> (mu)sic , (ma)il
$ws09 = name:ydiscord9
$ws10 = name:zextra


bind = $mainMod,         C, killactive,
bind = $mainMod,         M, exit,
bind = $mainMod,         L, exec, hyprlock
bind = $mainMod,         V, togglefloating,
bind = $mainMod,         J, togglesplit, # dwindle
bind = $mainMod,         F, fullscreen
bind = $mainMod SHIFT,   N, movecurrentworkspacetomonitor, +1
bind = $mainMod CONTROL, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

bind = $mainMod, F11, exec, pkill waybar
bind = $mainMod, F12, exec, waybar

bind = $mainMod,            Q, exec, $terminal
bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,            R, exec, $menu
bind = $mainMod,            D, exec, $run_menu
bind = $mainMod,          TAB, exec, $showWindows
bind = $mainMod,            T, exec, ~/.config/hypr/scripts/switch-ws-rofi.sh
bind = $mainMod,            W, exec, ~/.config/hypr/scripts/set-wall.sh
bind = $mainMod,            S, exec, ~/.config/hypr/scripts/arst.sh
bind = $mainMod,            P, exec, ~/.config/hypr/scripts/qwfp.sh
bind = $mainMod SHIFT,      E, exec, $fileManager
bind = $mainMod SHIFT,      Z, exec, $browser
bind = $mainMod SHIFT,      S, exec, ~/.config/hypr/scripts/hyprshot-select.sh
bind = $mainMod SHIFT,      C, exec, hyprpicker -a
bind = $mainMod SHIFT, period, exec, $emoji

# bind = $mainMod, SPACE, exec, hyprctl switchxkblayout all next

bind = $mainMod, h, movefocus, l
bind = $mainMod, i, movefocus, r
bind = $mainMod, e, movefocus, u
bind = $mainMod, n, movefocus, d

bind = $mainMod, 1, workspace, $ws01
bind = $mainMod, 2, workspace, $ws02
bind = $mainMod, 3, workspace, $ws03
bind = $mainMod, 4, workspace, $ws04
bind = $mainMod, 5, workspace, $ws05
bind = $mainMod, 6, workspace, $ws06
bind = $mainMod, 7, workspace, $ws07
bind = $mainMod, 8, workspace, $ws08
bind = $mainMod, 9, workspace, $ws09
bind = $mainMod, 0, workspace, $ws10

bind = $mainMod SHIFT, 1, movetoworkspace, $ws01
bind = $mainMod SHIFT, 2, movetoworkspace, $ws02
bind = $mainMod SHIFT, 3, movetoworkspace, $ws03
bind = $mainMod SHIFT, 4, movetoworkspace, $ws04
bind = $mainMod SHIFT, 5, movetoworkspace, $ws05
bind = $mainMod SHIFT, 6, movetoworkspace, $ws06
bind = $mainMod SHIFT, 7, movetoworkspace, $ws07
bind = $mainMod SHIFT, 8, movetoworkspace, $ws08
bind = $mainMod SHIFT, 9, movetoworkspace, $ws09
bind = $mainMod SHIFT, 0, movetoworkspace, $ws10

# bind = $mainMod, mouse_down, workspace, e-1
# bind = $mainMod, mouse_up, workspace, e+1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = $mainMod, equal, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel = $mainMod, minus, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
